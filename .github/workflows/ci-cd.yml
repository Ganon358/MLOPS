name: CI-CD MLOps Project

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  test-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Mettre à jour pip
        run: python -m pip install --upgrade pip

      - name: Installer les dépendances
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Vérifier que le package s'importe
        run: |
          python -c "import student_mlops; print('Package OK')"

      - name: Vérifier que les fichiers de données existent
        run: |
          python -c "from pathlib import Path; assert Path('data/processed/train.csv').exists(), 'train.csv introuvable'"
          python -c "from pathlib import Path; assert Path('data/processed/batch_1.csv').exists(), 'batch_1.csv introuvable'"
          python -c "from pathlib import Path; assert Path('data/processed/batch_2.csv').exists(), 'batch_2.csv introuvable'"

      - name: Vérifier que le modèle existe
        run: |
          python -c "from pathlib import Path; assert Path('models/model.joblib').exists(), 'models/model.joblib introuvable'"

      - name: Vérifier que l'API FastAPI se charge
        env:
          PYTHONPATH: src
        run: |
          python -c "from student_mlops.api.main import app; print('API OK')"

      - name: Lancer l'évaluation
        env:
          PYTHONPATH: src
        run: |
          python src/student_mlops/models/evaluate.py

      - name: Sauvegarder le modèle comme artefact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/model.joblib

  docker-build:
    runs-on: ubuntu-latest
    needs: test-and-validate

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Construire l'image Docker
        run: docker build -t student-mlops-api .